<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Surgeon's Night — El Turno de Guardia</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%230d1117'/%3E%3Cpath d='M9 4h6v5h5v6h-5v5H9v-5H4V9h5z' fill='%23ff5d5d'/%3E%3C/svg%3E">
<style>
  :root {
    --fondo: #0d1117;
    --panel: #131a23;
    --tinta: #d8e1ea;
    --borde: #2a3542;
    --acento: #66d9e8;
    --latido: #2ecc71;
    --alarma: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(1200px 600px at 50% -10%, #16212e 0%, var(--fondo) 60%);
    color: var(--tinta);
    font-family: "Cascadia Mono", "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.45;
    display: flex;
    flex-direction: column;
  }

  /* ── Cabecera: monitor de constantes ─────────────────────── */
  #cabecera {
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 10px 10px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #cabecera .cruz {
    width: 22px; height: 22px; flex: none;
    fill: var(--alarma);
    filter: drop-shadow(0 0 5px var(--alarma));
    animation: pulso-cruz 1.4s ease-in-out infinite;
  }
  #cabecera .titulo-cab {
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--acento);
    white-space: nowrap;
    text-shadow: 0 0 12px rgba(102, 217, 232, .35);
  }
  .ecg { flex: 1; height: 30px; min-width: 60px; }
  .ecg path {
    fill: none;
    stroke: var(--latido);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 190 660;
    animation: latido 3.2s linear infinite;
    filter: drop-shadow(0 0 4px var(--latido));
  }
  body.en-quirofano .ecg path { stroke: var(--alarma); filter: drop-shadow(0 0 4px var(--alarma)); animation-duration: 1.7s; }

  /* ── Terminal + menú ─────────────────────────────────────── */
  #app {
    max-width: 780px;
    width: 100%;
    flex: 1;
    min-height: 0;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    padding: 8px 10px 10px;
    position: relative;
  }
  #salida {
    flex: 1;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--borde);
    border-radius: 10px 10px 0 0;
    padding: 14px 16px;
    white-space: pre-wrap;
    word-break: break-word;
    scrollbar-width: thin;
    scrollbar-color: var(--borde) transparent;
    transition: border-color .4s, box-shadow .4s;
  }
  body.en-quirofano #salida {
    border-color: #7d2b35;
    box-shadow: inset 0 0 40px rgba(201, 42, 42, .08);
  }
  #salida.flash-exitus { animation: flash-exitus .7s ease-out; }
  .linea { animation: aparecer .16s ease-out; }
  /* ── Rail de comandas (pacientes pendientes, estilo Overcooked) ── */
  #comandas {
    display: flex; gap: 8px;
    background: #0b1119;
    border: 1px solid var(--borde); border-top: none;
    padding: 8px 10px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .comanda {
    flex: none; min-width: 108px;
    background: #131c28; border: 1px solid var(--borde); border-radius: 8px;
    padding: 6px 9px; font-size: .82em;
    animation: aparecer .25s ease-out;
  }
  .comanda .c-nombre { font-weight: 700; }
  .comanda .c-lugar { color: #8ea0b2; font-size: .9em; margin-top: 2px; }
  .c-barra { height: 6px; background: #0a0f16; border-radius: 4px; margin-top: 5px; overflow: hidden; }
  .c-nivel { height: 100%; border-radius: 4px; transition: width .6s ease; }
  .comanda.bien .c-nivel { background: #69db7c; }
  .comanda.regular .c-nivel { background: #ffd43b; }
  .comanda.critico .c-nivel { background: #ff6b6b; }
  .comanda.critico { border-color: #a13a44; animation: pulso-comanda 1s ease-in-out infinite; }
  .comanda.alerta { border-color: #ffd43b; }
  @keyframes pulso-comanda {
    0%, 100% { box-shadow: 0 0 0 rgba(255, 107, 107, 0); }
    50% { box-shadow: 0 0 12px rgba(255, 107, 107, .5); }
  }

  #menu {
    background: #0f151d;
    border: 1px solid var(--borde);
    border-top: none;
    border-radius: 0 0 10px 10px;
    padding: 10px 12px 12px;
    max-height: 45dvh;
    overflow-y: auto;
  }
  /* Menú quirúrgico: tarjetas visuales con el instrumental */
  #menu.quirurgico { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 8px; }
  #menu.quirurgico .menu-titulo { grid-column: 1 / -1; }
  button.opcion.tarjeta { margin: 0; align-items: center; background: #141d2a; }
  button.opcion.tarjeta .icono { flex: none; width: 40px; height: 40px; display: block; }
  button.opcion.tarjeta .icono .icono-svg { width: 40px; height: 40px; }
  button.opcion.tarjeta:hover .icono-svg g { stroke: var(--acento); }
  .menu-titulo { padding: 4px 2px 8px; font-weight: 700; }
  button.opcion {
    display: flex;
    align-items: baseline;
    gap: 10px;
    width: 100%;
    text-align: left;
    margin: 4px 0;
    padding: 9px 12px;
    background: #17202b;
    color: var(--tinta);
    border: 1px solid var(--borde);
    border-radius: 8px;
    font: inherit;
    cursor: pointer;
    transition: background .12s, border-color .12s, transform .05s;
    touch-action: manipulation;
    animation: aparecer .18s ease-out both;
  }
  button.opcion:hover, button.opcion:focus-visible {
    background: #1d2938;
    border-color: var(--acento);
    outline: none;
  }
  button.opcion:active { transform: scale(.995); }
  button.opcion .num { color: #ffd43b; min-width: 1.4em; flex: none; }
  button.opcion .detalle { color: #868e96; font-size: .9em; }
  button.reinicio { justify-content: center; color: var(--acento); font-weight: 700; }

  /* ── Estilos que emite el conversor ANSI → HTML ──────────── */
  .ansi-b { font-weight: 700; }
  .ansi-d { opacity: .65; }
  .ansi-i { font-style: italic; }
  .ansi-u { text-decoration: underline; }
  .ansi-inv { background: var(--tinta); color: var(--fondo); }
  .ansi-rojo { color: #ff6b6b; }
  .ansi-verde { color: #69db7c; }
  .ansi-amarillo { color: #ffd43b; }
  .ansi-azul { color: #74c0fc; }
  .ansi-magenta { color: #f783ac; }
  .ansi-cian { color: #66d9e8; }
  .ansi-gris { color: #868e96; }
  .ansi-fondo-rojo { background: #c92a2a; color: #fff; }

  /* ── Escenas ilustradas ──────────────────────────────────── */
  figure.escena { margin: 10px 0; animation: aparecer .4s ease-out; }
  .dibujo { display: block; width: 100%; max-width: 460px; height: auto; margin: 0 auto; }
  .estrella { fill: #cfe6ff; animation: titilar 3s ease-in-out infinite; }
  .ventana { fill: #ffd54a; opacity: .85; animation: ventana 7s steps(1) infinite; }
  .neon { fill: #ff5d5d; filter: drop-shadow(0 0 6px #ff5d5d); animation: pulso-cruz 2s ease-in-out infinite; }
  .baliza { fill: #ff6b6b; animation: baliza .8s steps(1) infinite; }
  .sol { fill: #ffd54a; filter: drop-shadow(0 0 14px rgba(255, 213, 74, .8)); animation: amanecer 3s ease-out forwards; }

  #silencio {
    flex: none;
    background: transparent;
    border: 1px solid var(--borde);
    border-radius: 8px;
    font-size: 15px;
    line-height: 1;
    padding: 5px 8px;
    cursor: pointer;
    transition: border-color .12s;
  }
  #silencio:hover { border-color: var(--acento); }

  /* Ficha visual del paciente: retrato + mapa corporal */
  .ficha-visual {
    display: flex; align-items: stretch; gap: 12px; flex-wrap: wrap;
    max-width: 480px;
  }
  .retrato {
    width: 118px; height: 118px; flex: none;
    border: 1px solid var(--borde); border-radius: 10px;
    background: #10161f;
  }
  .gota { animation: gotear 1.6s ease-in infinite; transform-box: fill-box; transform-origin: center; }
  .gota2 { animation-delay: .8s; }

  /* Mapa corporal del dolor */
  .ficha-cuerpo {
    display: flex; align-items: center; gap: 14px;
    background: #10161f; border: 1px solid var(--borde); border-radius: 10px;
    padding: 10px 14px; max-width: 340px;
  }
  .cuerpo { width: 92px; height: auto; flex: none; }
  .silueta { fill: #1b2634; stroke: #3b4c63; stroke-width: 1.5; }
  .guias { fill: none; stroke: #2a3949; stroke-width: .8; stroke-dasharray: 3 3; }
  .dolor {
    fill: var(--alarma);
    filter: drop-shadow(0 0 5px var(--alarma));
    animation: pulso-dolor 1.2s ease-in-out infinite;
  }
  .onda {
    fill: none; stroke: var(--alarma); stroke-width: 1.5;
    transform-box: fill-box; transform-origin: center;
    animation: onda 1.8s ease-out infinite;
  }
  .onda2 { animation-delay: .9s; }
  .cuerpo-pie { color: #9fb0c0; font-size: .92em; }

  /* Campo operatorio */
  .campo-svg { display: block; width: 100%; max-width: 400px; margin: 4px 0; }
  .sangre { transform-box: fill-box; transform-origin: center; animation: charco 1.6s ease-in-out infinite; }
  .chorro { animation: pulso-dolor .5s ease-in-out infinite; }
  .bilis { transform-box: fill-box; transform-origin: center; animation: charco 2.2s ease-in-out infinite; }
  .gota-bilis { animation: gotear 1.4s ease-in infinite; transform-box: fill-box; transform-origin: center; }
  .asa-necrotica { transform-box: fill-box; transform-origin: center; animation: pulso-asa 2s ease-in-out infinite; }
  .traza-alarma { stroke-dasharray: 60 220; animation: latido 1.1s linear infinite; }
  .alarma-led { animation: pulso-cruz .7s steps(1) infinite; }
  @keyframes charco { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }
  @keyframes pulso-asa { 0%, 100% { opacity: 1; } 50% { opacity: .75; } }

  /* Banner de quirófano */
  .q-banner {
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(90deg, #2b1216, #1a1013);
    border: 1px solid #7d2b35; border-radius: 10px;
    padding: 8px 16px; max-width: 460px; margin: 0 auto;
  }
  .q-lampara { width: 34px; height: auto; flex: none; filter: drop-shadow(0 0 10px rgba(255, 234, 169, .5)); }
  .q-texto { font-weight: 700; letter-spacing: 2px; color: #ffb3b3; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
  .punto-rec { width: 9px; height: 9px; border-radius: 50%; background: var(--alarma); animation: baliza 1s steps(1) infinite; box-shadow: 0 0 8px var(--alarma); }
  .ecg-mini { height: 22px; flex: 1; min-width: 40px; }
  .ecg-mini path { stroke: var(--alarma); stroke-dasharray: 80 300; animation-duration: 1.7s; filter: drop-shadow(0 0 3px var(--alarma)); }

  /* Ambulancia que cruza la pantalla */
  .ambulancia-capa {
    position: absolute; left: 0; right: 0; bottom: 55%;
    pointer-events: none; overflow: hidden; height: 60px; z-index: 5;
  }
  .ambulancia-capa .ambulancia-svg {
    width: 110px; height: auto;
    animation: conducir 2.6s cubic-bezier(.3, .1, .6, .9) forwards;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, .45));
  }

  /* ── Keyframes ───────────────────────────────────────────── */
  @keyframes latido { from { stroke-dashoffset: 850; } to { stroke-dashoffset: 0; } }
  @keyframes pulso-cruz { 0%, 100% { opacity: 1; } 50% { opacity: .45; } }
  @keyframes titilar { 0%, 100% { opacity: 1; } 50% { opacity: .15; } }
  @keyframes ventana { 0%, 82%, 100% { opacity: .85; } 84%, 96% { opacity: .12; } }
  @keyframes baliza { 0%, 100% { fill: #ff6b6b; background: #ff6b6b; } 50% { fill: #74c0fc; background: #74c0fc; } }
  @keyframes pulso-dolor { 0%, 100% { opacity: .9; } 50% { opacity: .35; } }
  @keyframes onda { from { transform: scale(.35); opacity: .9; } to { transform: scale(2.1); opacity: 0; } }
  @keyframes amanecer { from { transform: translateY(0); } to { transform: translateY(-26px); } }
  @keyframes conducir { from { transform: translateX(-130px); } to { transform: translateX(min(100vw, 800px)); } }
  @keyframes aparecer { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
  @keyframes gotear {
    0% { transform: translateY(0); opacity: 0; }
    25% { opacity: 1; }
    80% { transform: translateY(9px); opacity: .9; }
    100% { transform: translateY(12px); opacity: 0; }
  }
  @keyframes flash-exitus {
    0% { box-shadow: inset 0 0 0 rgba(201, 42, 42, 0); }
    25% { box-shadow: inset 0 0 120px rgba(201, 42, 42, .45); }
    100% { box-shadow: inset 0 0 0 rgba(201, 42, 42, 0); }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
  }
  @media (max-width: 480px) {
    body { font-size: 13px; }
    #app, #cabecera { padding-left: 6px; padding-right: 6px; }
    #cabecera .titulo-cab { font-size: .85em; letter-spacing: 1px; }
  }
</style>
</head>
<body>
<header id="cabecera">
  <svg class="cruz" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3h6v6h6v6h-6v6H9v-6H3V9h6z"/></svg>
  <span class="titulo-cab">SURGEON'S NIGHT</span>
  <svg class="ecg" viewBox="0 0 300 36" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0 18 h56 l6 0 4 -11 6 22 4 -11 h50 l6 0 4 -11 6 22 4 -11 h50 l6 0 4 -11 6 22 4 -11 H300"/>
  </svg>
  <button id="silencio" type="button" aria-label="Sonido">🔊</button>
</header>
<div id="app"></div>
<script>
/*__JS__*/
</script>
</body>
</html>
