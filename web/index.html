<style>

  #cabecera .cruz {

  #app {

  #salida {

    border: 1px solid var(--borde);

    padding: 14px 16px;
    white-space: pre-wrap;
    word-break: break-word;
    scrollbar-width: thin;
    scrollbar-color: var(--borde) transparent;
    transition: border-color .4s, box-shadow .4s;
  }
  body.en-quirofano #salida {
    border-color: #7d2b35;
    box-shadow: inset 0 0 40px rgba(201, 42, 42, .08);
  }
  #salida.flash-exitus { animation: flash-exitus .7s ease-out; }
  .linea { animation: aparecer .16s ease-out; }

    padding: 8px 10px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .comanda {

  .c-nivel { height: 100%; border-radius: 4px; transition: width .6s ease; }
  .comanda.bien .c-nivel { background: #97b077; }

  .comanda.critico .c-nivel { background: #c9645a; }
  .comanda.critico { border-color: #a13a44; animation: pulso-comanda 1s ease-in-out infinite; }
  .comanda.alerta { border-color: #d9b36a; }
  @keyframes pulso-comanda {

    color: var(--tinta);
    border: 1px solid var(--borde);

    touch-action: manipulation;
    animation: aparecer .18s ease-out both;

  .ansi-u { text-decoration: underline; }
  .ansi-inv { background: var(--tinta); color: var(--fondo); }

  .ansi-verde { color: #97b077; }
  .ansi-amarillo { color: #d9b36a; }
  .ansi-azul { color: #8ba3b8; }
  .ansi-magenta { color: #b58a9e; }
  .ansi-cian { color: #cfa257; }
  .ansi-gris { color: #8a7f6a; }
  .ansi-fondo-rojo { background: #74241e; color: #efe4d0; }

  /* ── Escenas ilustradas (viradas a sepia: cine de los 40) ── */
  figure.escena { margin: 10px 0; animation: aparecer .4s ease-out; }

  .retrato { filter: grayscale(.88) sepia(.25) contrast(1.08); }
  .cuerpo { filter: sepia(.3) saturate(.85); }
  .estrella { fill: #cfe6ff; animation: titilar 3s ease-in-out infinite; }
  .ventana { fill: #ffd54a; opacity: .85; animation: ventana 7s steps(1) infinite; }
  .neon { fill: #ff5d5d; filter: drop-shadow(0 0 6px #ff5d5d); animation: pulso-cruz 2s ease-in-out infinite; }
  .baliza { fill: #ff6b6b; animation: baliza .8s steps(1) infinite; }
  .sol { fill: #ffd54a; filter: drop-shadow(0 0 14px rgba(255, 213, 74, .8)); animation: amanecer 3s ease-out forwards; }

  #reloj-vivo {
    flex: none;
    font-size: .85em;
    color: var(--acento);
    border: 1px solid var(--borde);
    border-radius: 8px;

    background: transparent;
    border: 1px solid var(--borde);

    cursor: pointer;
    transition: border-color .12s;
  }
  #silencio:hover { border-color: var(--acento); }

  /* Ficha visual del paciente: retrato + mapa corporal */
  .ficha-visual {

  .retrato {

    border: 1px solid var(--borde); border-radius: 10px;
    background: var(--papel);
  }

  .gota2 { animation-delay: .8s; }

  /* Mapa corporal del dolor */
  .ficha-cuerpo {
    display: flex; align-items: center; gap: 14px;

  /* Banner de quirófano */
  .q-banner {
    display: flex; align-items: center; gap: 14px;

  .ambulancia-capa {

  /* ── Keyframes ───────────────────────────────────────────── */
  @keyframes latido { from { stroke-dashoffset: 850; } to { stroke-dashoffset: 0; } }
  @keyframes pulso-cruz { 0%, 100% { opacity: 1; } 50% { opacity: .45; } }
  @keyframes titilar { 0%, 100% { opacity: 1; } 50% { opacity: .15; } }
  @keyframes ventana { 0%, 82%, 100% { opacity: .85; } 84%, 96% { opacity: .12; } }
  @keyframes baliza { 0%, 100% { fill: #ff6b6b; background: #ff6b6b; } 50% { fill: #74c0fc; background: #74c0fc; } }
  @keyframes pulso-dolor { 0%, 100% { opacity: .9; } 50% { opacity: .35; } }
  @keyframes onda { from { transform: scale(.35); opacity: .9; } to { transform: scale(2.1); opacity: 0; } }
  @keyframes amanecer { from { transform: translateY(0); } to { transform: translateY(-26px); } }
  @keyframes conducir { from { transform: translateX(-130px); } to { transform: translateX(min(100vw, 800px)); } }
  @keyframes aparecer { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
  @keyframes gotear {
    0% { transform: translateY(0); opacity: 0; }
    25% { opacity: 1; }
    80% { transform: translateY(9px); opacity: .9; }
    100% { transform: translateY(12px); opacity: 0; }
  }
  @keyframes flash-exitus {
    0% { box-shadow: inset 0 0 0 rgba(201, 42, 42, 0); }
    25% { box-shadow: inset 0 0 120px rgba(201, 42, 42, .45); }
    100% { box-shadow: inset 0 0 0 rgba(201, 42, 42, 0); }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
  }
  @media (max-width: 480px) {
    body { font-size: 13px; }
    #app, #cabecera { padding-left: 6px; padding-right: 6px; }
    #cabecera .titulo-cab { font-size: .85em; letter-spacing: 1px; }
  }
</style>

        document.addEventListener("keydown", this.teclado);
        this.desplazarAlFinal();
      });
    }
    pausa(mensaje = "Pulsa Intro para continuar...") {
      const etiqueta = mensaje.includes("fichar") ? "▸ Fichar y empezar la guardia" : "▸ Continuar";
      return this.elegir(" ", [{ etiqueta, valor: void 0 }]);
    }
    /** Modo tiempo real: 1 s de reloj = 1 min de guardia, aunque no toques nada. */
    iniciarTiempoReal(latido) {
      const chip = document.getElementById("reloj-vivo");
      if (chip) chip.hidden = false;
      this.ticker = window.setInterval(() => {
        if (document.visibilityState !== "visible") return;
        const foto = latido();
        if (chip) {
          const h = Math.floor(foto.minutosRestantes / 60);
          const m = String(foto.minutosRestantes % 60).padStart(2, "0");
          chip.textContent = `🕐 ${horaGuardia(foto.minuto)} · quedan ${h}h ${m}m`;
          chip.classList.toggle("apurado", foto.minutosRestantes < 120);
        }
        this.pintarComandas(foto.tablero);
        for (const aviso of foto.avisos) this.escribir(aviso);
        if ((foto.avisos.length > 0 || foto.terminada) && this.autoRefresco) {
          const refrescar = this.autoRefresco;
          this.autoRefresco = null;
          refrescar();
        }
        if (foto.terminada && this.ticker !== null) {
          clearInterval(this.ticker);
          this.ticker = null;
        }
      }, 1e3);
    }
    cerrar() {
      sonido.pararLatido();
      if (this.ticker !== null) {
        clearInterval(this.ticker);
        this.ticker = null;
      }
      this.limpiarMenu();
      const boton = document.createElement("button");
      boton.className = "opcion reinicio";
      boton.textContent = "⟳ Empezar una nueva guardia";
      boton.addEventListener("click", () => location.reload());
      this.menu.appendChild(boton);
      this.desplazarAlFinal();
    }
    // ────────────────────────────────────────────────────────────
    /** Expediente persistente del cirujano (XP, rango, mejor guardia). */
    leerCarrera() {
      try {
        const crudo = localStorage.getItem("surgeons-night-carrera");
        return crudo ? JSON.parse(crudo) : null;
      } catch {
        return null;
      }
    }
    guardarCarrera(puntos) {
      try {
        const c = this.leerCarrera() ?? { guardias: 0, mejor: -Infinity, xp: 0 };
        c.guardias += 1;
        c.mejor = Math.max(c.mejor, puntos);
        c.xp += Math.max(0, puntos);
        localStorage.setItem("surgeons-night-carrera", JSON.stringify(c));
        this.escribir(
          `\x1B[90mExpediente actualizado: guardia nº ${c.guardias} · ${c.xp} XP · rango ${sinAnsi(this.rango(c.xp))}\x1B[39m`
        );
      } catch {
      }
    }
    rango(xp) {
      if (xp >= 6e3) return "Leyenda de la guardia";
      if (xp >= 4e3) return "Jefe de Servicio";
      if (xp >= 2500) return "Adjunto senior";
      if (xp >= 1500) return "Adjunto";
      if (xp >= 800) return "R5";
      if (xp >= 300) return "R3";
      return "R1 con vocación";
    }
    /** El rail de "comandas": cada paciente pendiente con su reloj vital. */
    pintarComandas(tablero) {
      this.comandas.hidden = tablero.length === 0;
      this.comandas.replaceChildren();
      for (const c of tablero) {
        const nivel = c.estabilidad >= 60 ? "bien" : c.estabilidad >= 35 ? "regular" : "critico";
        const tarjeta = document.createElement("div");
        tarjeta.className = `comanda ${nivel}${c.alerta ? " alerta" : ""}`;
        tarjeta.innerHTML = `
        <div class="c-nombre">${escaparHtml(c.nombre.split(" ")[0] ?? c.nombre)}</div>
        <div class="c-barra"><div class="c-nivel" style="width:${Math.max(0, Math.min(100, Math.round(c.estabilidad)))}%"></div></div>
        <div class="c-lugar">${c.lugar === "espera" ? "🚪 urgencias" : "🛏 planta"}${c.alerta ? " ⚠" : ""}</div>`;
        this.comandas.appendChild(tarjeta);
      }
    }
    insertarArte(html, clase) {
      const figura = document.createElement("figure");
      figura.className = `escena escena-${clase}`;
      figura.innerHTML = html;
      this.salida.appendChild(figura);
      this.desplazarAlFinal();
    }
    /** La ambulancia cruza la pantalla como capa superpuesta (no altera el log). */
    animarAmbulancia() {
      const capa = document.createElement("div");
      capa.className = "ambulancia-capa";
      capa.innerHTML = SVG_AMBULANCIA;
      document.getElementById("app")?.appendChild(capa);
      const svg = capa.firstElementChild;
      svg?.addEventListener("animationend", () => capa.remove());
      setTimeout(() => capa.remove(), 4e3);
    }
    /** Destello rojo del terminal cuando fallece un paciente. */
    flashExitus() {
      this.salida.classList.remove("flash-exitus");
      void this.salida.offsetWidth;
      this.salida.classList.add("flash-exitus");
    }
    limpiarMenu() {
      if (this.teclado) {
        document.removeEventListener("keydown", this.teclado);
        this.teclado = null;
      }
      this.autoRefresco = null;
      this.menu.classList.remove("quirurgico");
      this.menu.replaceChildren();
    }
    desplazarAlFinal() {
      requestAnimationFrame(() => {
        this.salida.scrollTop = this.salida.scrollHeight;
      });
    }
  };

  // src/web/main.ts
  configurarColores(true);
  var parametros = new URLSearchParams(location.search);
  var semillaParam = parametros.get("seed");
  var semilla = semillaParam !== null && Number.isFinite(Number(semillaParam)) ? Number(semillaParam) : void 0;
  var modoParam = parametros.get("modo");
  var modo = modoParam === "residente" || modoParam === "adjunto" || modoParam === "negra" ? modoParam : void 0;
  var ritmoParam = parametros.get("ritmo");
  var ritmo = ritmoParam === "real" || ritmoParam === "turnos" ? ritmoParam : void 0;
  var io = new WebIO(document.getElementById("app"));
  new ShiftEngine(io, semilla, modo, ritmo).iniciar().catch((error) => {
    io.escribir(`\x1B[31mLa guardia ha terminado de forma inesperada: ${String(error)}\x1B[39m`);
  });
})();

</script>
