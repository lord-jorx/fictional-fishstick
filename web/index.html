<style>

    --panel: #131a23;
    --tinta: #d8e1ea;
    --borde: #2a3542;
    --acento: #66d9e8;

    --alarma: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {

    background: radial-gradient(1200px 600px at 50% -10%, #16212e 0%, var(--fondo) 60%);

    font-size: 14px;
    line-height: 1.45;
    display: flex;
    flex-direction: column;
  }

  /* ── Cabecera: monitor de constantes ─────────────────────── */
  #cabecera {
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 10px 10px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #cabecera .cruz {
    width: 22px; height: 22px; flex: none;
    fill: var(--alarma);
    filter: drop-shadow(0 0 5px var(--alarma));
    animation: pulso-cruz 1.4s ease-in-out infinite;
  }
  #cabecera .titulo-cab {
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--acento);
    white-space: nowrap;
    text-shadow: 0 0 12px rgba(102, 217, 232, .35);
  }
  .ecg { flex: 1; height: 30px; min-width: 60px; }
  .ecg path {
    fill: none;
    stroke: var(--latido);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 190 660;
    animation: latido 3.2s linear infinite;
    filter: drop-shadow(0 0 4px var(--latido));
  }
  body.en-quirofano .ecg path { stroke: var(--alarma); filter: drop-shadow(0 0 4px var(--alarma)); animation-duration: 1.7s; }

  /* ── Terminal + menú ─────────────────────────────────────── */
  #app {
    max-width: 780px;
    width: 100%;
    flex: 1;
    min-height: 0;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    padding: 8px 10px 10px;
    position: relative;
  }
  #salida {
    flex: 1;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--borde);
    border-radius: 10px 10px 0 0;
    padding: 14px 16px;
    white-space: pre-wrap;
    word-break: break-word;
    scrollbar-width: thin;
    scrollbar-color: var(--borde) transparent;
    transition: border-color .4s, box-shadow .4s;
  }
  body.en-quirofano #salida {
    border-color: #7d2b35;
    box-shadow: inset 0 0 40px rgba(201, 42, 42, .08);
  }
  #salida.flash-exitus { animation: flash-exitus .7s ease-out; }
  .linea { animation: aparecer .16s ease-out; }
  #menu {
    background: #0f151d;
    border: 1px solid var(--borde);
    border-top: none;
    border-radius: 0 0 10px 10px;
    padding: 10px 12px 12px;
    max-height: 45dvh;
    overflow-y: auto;
  }
  .menu-titulo { padding: 4px 2px 8px; font-weight: 700; }
  button.opcion {
    display: flex;
    align-items: baseline;
    gap: 10px;
    width: 100%;
    text-align: left;
    margin: 4px 0;
    padding: 9px 12px;
    background: #17202b;
    color: var(--tinta);
    border: 1px solid var(--borde);
    border-radius: 8px;
    font: inherit;
    cursor: pointer;
    transition: background .12s, border-color .12s, transform .05s;
    touch-action: manipulation;
    animation: aparecer .18s ease-out both;
  }
  button.opcion:hover, button.opcion:focus-visible {
    background: #1d2938;
    border-color: var(--acento);
    outline: none;
  }
  button.opcion:active { transform: scale(.995); }
  button.opcion .num { color: #ffd43b; min-width: 1.4em; flex: none; }
  button.opcion .detalle { color: #868e96; font-size: .9em; }
  button.reinicio { justify-content: center; color: var(--acento); font-weight: 700; }

  /* ── Estilos que emite el conversor ANSI → HTML ──────────── */
  .ansi-b { font-weight: 700; }
  .ansi-d { opacity: .65; }
  .ansi-i { font-style: italic; }
  .ansi-u { text-decoration: underline; }
  .ansi-inv { background: var(--tinta); color: var(--fondo); }
  .ansi-rojo { color: #ff6b6b; }
  .ansi-verde { color: #69db7c; }
  .ansi-amarillo { color: #ffd43b; }
  .ansi-azul { color: #74c0fc; }
  .ansi-magenta { color: #f783ac; }
  .ansi-cian { color: #66d9e8; }
  .ansi-gris { color: #868e96; }
  .ansi-fondo-rojo { background: #c92a2a; color: #fff; }

  figure.escena { margin: 10px 0; animation: aparecer .4s ease-out; }
  .dibujo { display: block; width: 100%; max-width: 460px; height: auto; margin: 0 auto; }
  .estrella { fill: #cfe6ff; animation: titilar 3s ease-in-out infinite; }
  .ventana { fill: #ffd54a; opacity: .85; animation: ventana 7s steps(1) infinite; }
  .neon { fill: #ff5d5d; filter: drop-shadow(0 0 6px #ff5d5d); animation: pulso-cruz 2s ease-in-out infinite; }
  .baliza { fill: #ff6b6b; animation: baliza .8s steps(1) infinite; }
  .sol { fill: #ffd54a; filter: drop-shadow(0 0 14px rgba(255, 213, 74, .8)); animation: amanecer 3s ease-out forwards; }

  /* Mapa corporal del dolor */
  .ficha-cuerpo {
    display: flex; align-items: center; gap: 14px;
    background: #10161f; border: 1px solid var(--borde); border-radius: 10px;
    padding: 10px 14px; max-width: 340px;
  }
  .cuerpo { width: 92px; height: auto; flex: none; }
  .silueta { fill: #1b2634; stroke: #3b4c63; stroke-width: 1.5; }
  .guias { fill: none; stroke: #2a3949; stroke-width: .8; stroke-dasharray: 3 3; }
  .dolor {
    fill: var(--alarma);
    filter: drop-shadow(0 0 5px var(--alarma));
    animation: pulso-dolor 1.2s ease-in-out infinite;
  }
  .onda {
    fill: none; stroke: var(--alarma); stroke-width: 1.5;
    transform-box: fill-box; transform-origin: center;
    animation: onda 1.8s ease-out infinite;
  }
  .onda2 { animation-delay: .9s; }
  .cuerpo-pie { color: #9fb0c0; font-size: .92em; }

  /* Banner de quirófano */
  .q-banner {
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(90deg, #2b1216, #1a1013);
    border: 1px solid #7d2b35; border-radius: 10px;
    padding: 8px 16px; max-width: 460px; margin: 0 auto;
  }
  .q-lampara { width: 34px; height: auto; flex: none; filter: drop-shadow(0 0 10px rgba(255, 234, 169, .5)); }
  .q-texto { font-weight: 700; letter-spacing: 2px; color: #ffb3b3; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
  .punto-rec { width: 9px; height: 9px; border-radius: 50%; background: var(--alarma); animation: baliza 1s steps(1) infinite; box-shadow: 0 0 8px var(--alarma); }
  .ecg-mini { height: 22px; flex: 1; min-width: 40px; }
  .ecg-mini path { stroke: var(--alarma); stroke-dasharray: 80 300; animation-duration: 1.7s; filter: drop-shadow(0 0 3px var(--alarma)); }

  /* Ambulancia que cruza la pantalla */
  .ambulancia-capa {
    position: absolute; left: 0; right: 0; bottom: 55%;
    pointer-events: none; overflow: hidden; height: 60px; z-index: 5;
  }
  .ambulancia-capa .ambulancia-svg {
    width: 110px; height: auto;
    animation: conducir 2.6s cubic-bezier(.3, .1, .6, .9) forwards;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, .45));
  }

  /* ── Keyframes ───────────────────────────────────────────── */
  @keyframes latido { from { stroke-dashoffset: 850; } to { stroke-dashoffset: 0; } }
  @keyframes pulso-cruz { 0%, 100% { opacity: 1; } 50% { opacity: .45; } }
  @keyframes titilar { 0%, 100% { opacity: 1; } 50% { opacity: .15; } }
  @keyframes ventana { 0%, 82%, 100% { opacity: .85; } 84%, 96% { opacity: .12; } }
  @keyframes baliza { 0%, 100% { fill: #ff6b6b; background: #ff6b6b; } 50% { fill: #74c0fc; background: #74c0fc; } }
  @keyframes pulso-dolor { 0%, 100% { opacity: .9; } 50% { opacity: .35; } }
  @keyframes onda { from { transform: scale(.35); opacity: .9; } to { transform: scale(2.1); opacity: 0; } }
  @keyframes amanecer { from { transform: translateY(0); } to { transform: translateY(-26px); } }
  @keyframes conducir { from { transform: translateX(-130px); } to { transform: translateX(min(100vw, 800px)); } }
  @keyframes aparecer { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
  @keyframes flash-exitus {
    0% { box-shadow: inset 0 0 0 rgba(201, 42, 42, 0); }
    25% { box-shadow: inset 0 0 120px rgba(201, 42, 42, .45); }
    100% { box-shadow: inset 0 0 0 rgba(201, 42, 42, 0); }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
  }
  @media (max-width: 480px) {
    body { font-size: 13px; }
    #app, #cabecera { padding-left: 6px; padding-right: 6px; }
    #cabecera .titulo-cab { font-size: .85em; letter-spacing: 1px; }
  }
</style>
</head>
